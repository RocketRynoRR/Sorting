<!DOCTYPE html>
<html>

<head>
  <title>QR Storage Manager</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
</head>

<body>

  <h1>QR Storage Manager</h1>

  <p>Manage storage boxes and locations</p>
<h2>Add Main Location</h2>

<input type="text" id="mainLocationName" placeholder="Work, Home, Shed etc.">

<button onclick="addMainLocation()">Add Location</button>

<h2>Select Main Location</h2>

<select id="selectedMainLocation" onchange="displayBoxes()">
</select>
  <h2>Add New Box</h2>

  <input type="text" id="boxName" placeholder="Box Name">

  <input type="text" id="boxLocation" placeholder="Location">

  <button onclick="addBox()">Add Box</button>

  <h2>Stored Boxes</h2>

  <div id="boxList"></div>

  <script>

    let boxes = [];
let mainLocations = [];
const savedBoxes = localStorage.getItem("boxes");

if (savedBoxes) {
  boxes = JSON.parse(savedBoxes);
  displayBoxes();
}
    const savedMainLocations = localStorage.getItem("mainLocations");

if (savedMainLocations) {
  mainLocations = JSON.parse(savedMainLocations);
}

function addMainLocation() {
  const name = document.getElementById("mainLocationName").value;

  if (name.trim() === "") {
    alert("Please enter a location name.");
    return;
  }

  const location = {
    id: "LOC" + (mainLocations.length + 1).toString().padStart(3, "0"),
    name: name
  };

  mainLocations.push(location);

  localStorage.setItem("mainLocations", JSON.stringify(mainLocations));

  document.getElementById("mainLocationName").value = "";

  displayMainLocations();
}

function displayMainLocations() {
  const select = document.getElementById("selectedMainLocation");

  select.innerHTML = "";

  mainLocations.forEach((location) => {
    select.innerHTML += `
      <option value="${location.id}">${location.name}</option>
    `;
  });
}
    function addBox() {

      const name = document.getElementById("boxName").value;
      const location = document.getElementById("boxLocation").value;

      const selectedMainLocation = document.getElementById("selectedMainLocation").value;

const box = {
  id: "BOX" + (boxes.length + 1).toString().padStart(3, "0"),
  mainLocationId: selectedMainLocation,
  name: name,
  location: location
};

      boxes.push(box);

      localStorage.setItem("boxes", JSON.stringify(boxes));

      displayBoxes();
    }

    function displayBoxes() {

      const boxList = document.getElementById("boxList");

      boxList.innerHTML = "";

      const selectedMainLocation = document.getElementById("selectedMainLocation").value;

const filteredBoxes = boxes.filter(box => box.mainLocationId === selectedMainLocation);

filteredBoxes.forEach((box) => {

       boxList.innerHTML += `
  <div style="
    border:1px solid #ccc;
    padding:10px;
    margin-bottom:10px;
  ">
    <h3>${box.id} - ${box.name}</h3>
    <p>Location: ${box.location}</p>

    <button onclick="generateQRCode('${box.id}')">
      Create QR Code
    </button>

    <div id="qr-${box.id}" style="margin-top:10px;"></div>
  </div>
`;
      });
    }
function generateQRCode(boxId) {
  const qrContainer = document.getElementById("qr-" + boxId);

  qrContainer.innerHTML = "";

  QRCode.toCanvas(boxId, function (error, canvas) {
    if (error) {
      alert("QR code could not be created.");
      console.error(error);
      return;
    }

    qrContainer.appendChild(canvas);
  });
}
    
displayMainLocations();
displayBoxes();
  </script>

</body>

</html>
