<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Home QR Storage</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Home inventory</p>
          <h1>QR Storage</h1>
        </div>
        <div class="toolbar search-bubble hidden" id="searchToolbar">
          <label class="search">
            <span>Search</span>
            <input id="searchInput" autocomplete="off" placeholder="Find items, locations, categories">
          </label>
          <button class="ghost-button" id="clearSearchButton" type="button">Clear</button>
          <div class="search-results hidden" id="searchResults"></div>
        </div>
        <div class="topbar-actions">
          <button class="search-icon-button hidden" id="searchToggleButton" type="button" aria-label="Open search">&#8981;</button>
          <span class="sync-status" id="syncStatus">Offline</span>
          <button class="ghost-button" id="exportButton" type="button">Export</button>
          <div class="account-menu hidden" id="accountMenu">
            <button class="account-button" id="accountButton" type="button" aria-label="Account menu">A</button>
            <div class="account-dropdown hidden" id="accountDropdown">
              <button type="button" data-account-action="settings">Settings</button>
              <button type="button" id="signOutButton">Sign Out</button>
            </div>
          </div>
        </div>
      </header>

      <section class="auth-panel panel" id="authPanel">
        <div>
          <p class="eyebrow">Cloud sync</p>
          <h2>Sign in to save and sync your storage list</h2>
        </div>
        <form class="auth-form" id="authForm">
          <label>
            Email
            <input id="authEmail" type="email" autocomplete="email" placeholder="you@example.com" required>
          </label>
          <label>
            Password
            <input id="authPassword" type="password" autocomplete="current-password" placeholder="At least 6 characters" required>
          </label>
          <div class="auth-actions">
            <button class="primary-button" type="submit">Sign In</button>
            <button class="ghost-button" id="signUpButton" type="button">Create Account</button>
          </div>
          <p class="auth-message" id="authMessage"></p>
        </form>
      </section>

      <main class="dashboard hidden" id="dashboard">
        <section class="summary-grid" aria-label="Storage summary">
          <article class="summary-card">
            <span>Locations</span>
            <strong id="summaryLocations">0</strong>
          </article>
          <article class="summary-card">
            <span>Items</span>
            <strong id="summaryItems">0</strong>
          </article>
          <article class="summary-card">
            <span>Places</span>
            <strong id="summaryPlaces">0</strong>
          </article>
        </section>

        <nav class="mode-tabs" aria-label="Storage tools">
          <button class="mode-tab active" data-mode="home" type="button">Add Item</button>
          <button class="mode-tab" data-mode="add" type="button">Add Location</button>
          <button class="mode-tab" data-mode="edit" type="button">Edit Locations</button>
          <button class="mode-tab" data-mode="move" type="button">Move Items</button>
          <button class="mode-tab" data-mode="shared" type="button">Shared Locations</button>
        </nav>
        <label class="mobile-mode-control">
          Menu
          <select id="mobileModeSelect" class="mobile-mode-select">
            <option value="home">Add Item</option>
            <option value="add">Add Location</option>
            <option value="edit">Edit Locations</option>
            <option value="move">Move Items</option>
            <option value="shared">Shared Locations</option>
          </select>
        </label>

        <section class="mode-panel" id="modePanel"></section>
      </main>
    </div>

    <div class="label-designer hidden" id="labelDesigner" role="dialog" aria-modal="true" aria-labelledby="labelDesignerTitle">
      <form class="label-designer-card" id="labelDesignerForm">
        <div class="label-designer-header">
          <div>
            <p class="eyebrow">Print label</p>
            <h2 id="labelDesignerTitle">Customize Label</h2>
          </div>
          <button class="ghost-button" id="closeLabelDesigner" type="button">Close</button>
        </div>

        <div class="label-control-grid">
          <label>
            Size preset
            <select id="labelPreset">
              <option value="small">Small drawer</option>
              <option value="medium" selected>Box label</option>
              <option value="large">Large tub</option>
              <option value="custom">Custom</option>
            </select>
          </label>
          <label>
            Width mm
            <input id="labelWidth" type="range" min="50" max="200" value="100">
          </label>
          <label>
            Height mm
            <input id="labelHeight" type="range" min="30" max="140" value="70">
          </label>
          <label>
            QR size mm
            <input id="labelQrSize" type="range" min="18" max="80" value="38">
          </label>
          <label>
            Title size pt
            <input id="labelTitleSize" type="range" min="10" max="42" value="24">
          </label>
          <label>
            Text size pt
            <input id="labelTextSize" type="range" min="7" max="18" value="11">
          </label>
          <label>
            Contents shown
            <input id="labelItemLimit" type="range" min="0" max="12" value="8">
          </label>
          <label>
            Layout
            <select id="labelLayout">
              <option value="side" selected>QR left</option>
              <option value="stacked">QR top</option>
              <option value="qr-only">QR only</option>
            </select>
          </label>
        </div>

        <fieldset class="label-checks">
          <legend>Include</legend>
          <label><input id="labelShowPlace" type="checkbox" checked> Place</label>
          <label><input id="labelShowParent" type="checkbox" checked> Parent location</label>
          <label><input id="labelShowCount" type="checkbox" checked> Item count</label>
          <label><input id="labelShowContents" type="checkbox" checked> Contents preview</label>
          <label><input id="labelShowUrl" type="checkbox"> URL text</label>
        </fieldset>

        <section class="label-live-preview" aria-label="Live label preview">
          <div id="labelPreview"></div>
        </section>

        <div class="label-designer-actions">
          <button class="ghost-button" id="previewLabelButton" type="button">Preview</button>
          <button class="primary-button" type="submit">Create Printable Label</button>
        </div>
      </form>
    </div>

    <div class="share-dialog hidden" id="shareDialog" role="dialog" aria-modal="true" aria-labelledby="shareDialogTitle">
      <form class="share-dialog-card" id="shareForm">
        <div class="share-dialog-header">
          <div>
            <p class="eyebrow">Share</p>
            <h2 id="shareDialogTitle">Share Item</h2>
          </div>
          <button class="ghost-button" id="closeShareDialog" type="button">Close</button>
        </div>
        <label>
          User email
          <input id="shareEmail" type="email" autocomplete="email" placeholder="friend@example.com" required>
        </label>
        <p class="muted-copy" id="shareHelp">They need to sign into this app with the same email.</p>
        <div class="share-actions">
          <button class="primary-button" type="submit">Share</button>
        </div>
      </form>
    </div>

    <template id="emptyStateTemplate">
      <div class="empty-state">
        <div class="empty-mark">QR</div>
        <h2>Create your first storage location</h2>
        <p>Start with one box, shelf, drawer, or tub.</p>
      </div>
    </template>

    <template id="homeTemplate">
      <section class="home-grid">
        <div class="panel location-browser">
          <div class="section-heading">
            <h2>Locations</h2>
            <span class="count-pill" id="locationCount">0</span>
          </div>
          <div class="location-list" id="locationList"></div>
        </div>

        <div class="location-detail" id="locationDetail"></div>
      </section>
    </template>

    <template id="locationDetailTemplate">
      <div class="detail-header">
        <div>
          <p class="eyebrow location-area"></p>
          <h2 class="location-title"></h2>
        </div>
        <div class="detail-actions">
          <button class="action-dot share-location-button" type="button" aria-label="Share location">...</button>
          <button class="ghost-button label-button" type="button">Create Label</button>
          <button class="danger-button delete-location-button" type="button">Delete</button>
        </div>
      </div>

      <div class="detail-grid">
        <details class="panel qr-panel">
          <summary>QR Code And Link</summary>
          <div class="qr-panel-body">
            <img class="qr-image" alt="">
            <div>
              <h3>Label URL</h3>
              <input class="qr-url" readonly>
            </div>
          </div>
        </details>

        <form class="panel item-form">
          <h3>Add Item</h3>
          <div class="item-form-grid">
            <label>
              Item
              <input class="item-name" autocomplete="off" placeholder="Extension cord" required>
            </label>
            <label>
              Qty
              <input class="item-quantity" type="number" min="1" step="1" value="1" required>
            </label>
          </div>
          <label>
            Category
            <select class="item-category" required></select>
          </label>
          <label class="new-category-field hidden">
            New category
            <input class="new-category-name" autocomplete="off" placeholder="Tools">
          </label>
          <label class="item-section-field hidden">
            Section
            <select class="item-section"></select>
          </label>
          <label>
            Notes
            <textarea class="item-notes" rows="3" placeholder="Black cable, 5m"></textarea>
          </label>
          <label>
            Photo
            <input class="item-photo" type="file" accept="image/*" capture="environment">
          </label>
          <button class="primary-button" type="submit">Add Item</button>
        </form>
      </div>

      <section class="panel">
        <div class="section-heading">
          <h3>Items</h3>
          <span class="count-pill item-count">0</span>
        </div>
        <div class="items-list"></div>
      </section>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
  </body>
</html>
