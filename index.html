<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Home QR Storage</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Home inventory</p>
          <h1>QR Storage</h1>
        </div>
        <button class="ghost-button" id="exportButton" type="button">Export</button>
      </header>

      <main class="layout">
        <aside class="sidebar" aria-label="Storage locations">
          <form class="panel compact-form" id="locationForm">
            <h2>Add Location</h2>
            <label>
              Name
              <input id="locationName" name="locationName" autocomplete="off" placeholder="Blue tub 03" required>
            </label>
            <label>
              Area
              <input id="locationArea" name="locationArea" autocomplete="off" placeholder="Garage">
            </label>
            <button class="primary-button" type="submit">Create Location</button>
          </form>

          <section class="panel">
            <div class="section-heading">
              <h2>Locations</h2>
              <span id="locationCount">0</span>
            </div>
            <div class="location-list" id="locationList"></div>
          </section>
        </aside>

        <section class="workspace">
          <div class="toolbar">
            <label class="search">
              <span>Search</span>
              <input id="searchInput" autocomplete="off" placeholder="Item, box, room, note">
            </label>
            <button class="ghost-button" id="clearSearchButton" type="button">Clear</button>
          </div>

          <section class="location-detail" id="locationDetail"></section>
        </section>
      </main>
    </div>

    <template id="emptyStateTemplate">
      <div class="empty-state">
        <div class="empty-mark">QR</div>
        <h2>Create your first storage location</h2>
        <p>Start with one box, shelf, drawer, or tub.</p>
      </div>
    </template>

    <template id="locationDetailTemplate">
      <div class="detail-header">
        <div>
          <p class="eyebrow location-area"></p>
          <h2 class="location-title"></h2>
        </div>
        <div class="detail-actions">
          <button class="ghost-button print-button" type="button">Print QR</button>
          <button class="danger-button delete-location-button" type="button">Delete</button>
        </div>
      </div>

      <div class="detail-grid">
        <section class="panel qr-panel">
          <img class="qr-image" alt="">
          <div>
            <h3>Label URL</h3>
            <input class="qr-url" readonly>
          </div>
        </section>

        <form class="panel item-form">
          <h3>Add Item</h3>
          <div class="item-form-grid">
            <label>
              Item
              <input class="item-name" autocomplete="off" placeholder="Extension cord" required>
            </label>
            <label>
              Qty
              <input class="item-quantity" type="number" min="1" step="1" value="1" required>
            </label>
          </div>
          <label>
            Category
            <input class="item-category" autocomplete="off" placeholder="Tools">
          </label>
          <label>
            Notes
            <textarea class="item-notes" rows="3" placeholder="Black cable, 5m"></textarea>
          </label>
          <button class="primary-button" type="submit">Add Item</button>
        </form>
      </div>

      <section class="panel">
        <div class="section-heading">
          <h3>Items</h3>
          <span class="item-count">0</span>
        </div>
        <div class="items-list"></div>
      </section>
    </template>

    <script src="app.js"></script>
  </body>
</html>
